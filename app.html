<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hareket Takibi</title>
    <script src="model.js?v=999"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .container { background: #1e1e1e; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #00ff88; margin-bottom: 20px; }
        .btn { background: #00ff88; color: #121212; border: none; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 25px; cursor: pointer; width: 100%; }
        #analiz-ekrani { display: none; flex-direction: column; gap: 20px; }
        .tahmin-box { font-size: 32px; font-weight: bold; color: #00ff88; margin: 20px 0; }
        .durum-box { background: #292929; padding: 10px; border-radius: 10px; font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

<div class="container">
    <div id="tanitim-ekrani">
        <h1>Hareket Takibi</h1>
        <button class="btn" onclick="ekranDegistirVeIzinAl()">SİSTEMİ BAŞLAT</button>
    </div>

    <div id="analiz-ekrani">
        <h1>Canlı Analiz</h1>
        <div id="durum" class="durum-box">Başlatılıyor...</div>
        <div class="tahmin-box" id="tahmin">BEKLENİYOR</div>
        <div style="text-align: left; background: #222; padding: 15px; border-radius: 10px;">
            <p>Oturma: <span id="time-oturma">0 sn</span></p>
            <p>Yürüme: <span id="time-yurume">0 sn</span></p>
            <p>Koşma: <span id="time-kosma">0 sn</span></p>
        </div>
    </div>
</div>

<script>
let sensorBuffer = [];
const windowSize = 50; 
const sınıflar = ["kosma", "oturma", "yurume"]; 
let sureler = { "oturma": 0, "yurume": 0, "kosma": 0 };

function logYaz(mesaj) {
    const lb = document.getElementById("durum");
    if (lb) lb.innerText = mesaj;
}

function ekranDegistirVeIzinAl() {
    document.getElementById("tanitim-ekrani").style.display = "none";
    document.getElementById("analiz-ekrani").style.display = "flex";

    if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
        DeviceMotionEvent.requestPermission()
            .then(state => {
                if (state === 'granted') baslat();
                else logYaz("İzin verilmedi!");
            })
            .catch(e => logYaz("Hata: " + e));
    } else {
        baslat();
    }
}

function baslat() {
    logYaz("Sensörler aktif...");
    window.addEventListener('devicemotion', (event) => {
        let acc = event.accelerationIncludingGravity;
        if (acc && acc.x !== null) {
            sensorBuffer.push([acc.x, acc.y, acc.z]);
            if (sensorBuffer.length >= windowSize) {
                tahminEt(sensorBuffer);
                sensorBuffer = [];
            }
        }
    }, true);
}

function tahminEt(data) {
    try {
        let sumX = 0, sumY = 0, sumZ = 0;
        for (let i = 0; i < data.length; i++) {
            sumX += data[i][0]; sumY += data[i][1]; sumZ += data[i][2];
        }
        
        if (typeof score === 'undefined') {
            logYaz("Model yuklenemedi!");
            return;
        }

        let input = [sumX/data.length, sumY/data.length, sumZ/data.length];
        let idx = score(input);
        let tahmin = sınıflar[idx] || "oturma";

        document.getElementById("tahmin").innerText = tahmin.toUpperCase();
        sureler[tahmin]++;
        document.getElementById("time-" + tahmin).innerText = sureler[tahmin] + " sn";
    } catch (e) {
        logYaz("Tahmin Hatası!");
    }
}
</script>
</body>
</html>
